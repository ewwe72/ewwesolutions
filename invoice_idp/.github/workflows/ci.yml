name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: invoice_idp
          POSTGRES_PASSWORD: invoice_idp
          POSTGRES_DB: invoice_idp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_idp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://invoice_idp:invoice_idp@localhost:5432/invoice_idp_test
      TEST_DATABASE_URL: postgresql+asyncpg://invoice_idp:invoice_idp@localhost:5432/invoice_idp_test
      SESSION_SECRET: ci-dummy-secret-for-tests-only-do-not-use-in-prod
      CSRF_SECRET: ci-dummy-csrf-secret-for-tests-only-do-not-use-in-prod
      APP_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "pydantic[email]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Run mypy --strict
        run: mypy --strict src/
