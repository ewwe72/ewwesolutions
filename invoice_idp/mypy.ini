[mypy]
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
extra_checks = True

[mypy-lxml.*]
ignore_missing_imports = True

[mypy-stripe.*]
ignore_missing_imports = True

# Stripe SDK returns Any-typed objects; allow untyped calls in the
# real client (the Console implementation stays strict).
[mypy-src.app.billing.stripe_client]
disallow_untyped_calls = False
warn_return_any = False

[mypy-pymupdf.*]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-arq.*]
ignore_missing_imports = True

# FastAPI's `Request` (= starlette.requests.Request) is Generic[StateType]
# but FastAPI's route dependency analyser rejects parameterised forms like
# `Request[Any]`. Suppress the `type-arg` complaint in auth code where the
# bare annotation is required at runtime.
[mypy-src.app.auth.*]
disable_error_code = type-arg

[mypy-src.app.web.*]
disable_error_code = type-arg

# boto3 returns Any-typed responses without boto3-stubs; suppress
# untyped-call complaints on storage adapter and worker.
[mypy-src.app.storage]
disallow_untyped_calls = False

[mypy-src.app.workers.*]
disallow_untyped_calls = False

# arq has partial stubs; api invoice routes import RedisSettings.from_dsn
# which lacks return-type annotations. Also waives the `Request[Any]`
# vs bare `Request` annotation conflict (FastAPI rejects parameterised).
[mypy-src.app.api.invoices]
disallow_untyped_calls = False
disable_error_code = type-arg

# PyMuPDF has no type stubs; treat its calls as Any-typed.
[mypy-src.pipeline.extraction.pdf]
disallow_untyped_calls = False

# Anthropic SDK accepts dict messages but mypy can't reconcile our
# generic dict[str, Any] message structure against the SDK's TypedDicts.
[mypy-src.pipeline.extraction.anthropic_provider]
disallow_untyped_calls = False
disable_error_code = call-overload
