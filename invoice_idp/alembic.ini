# Alembic configuration.
# sqlalchemy.url is set programmatically from src.app.config in alembic/env.py.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

# Format generated migration file names: 0001_short_slug.py, 0002_...
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
